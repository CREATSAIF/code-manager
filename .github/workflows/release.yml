name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed so the changelog subcommand can
          # resolve the tag a release commit was tagged at.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: |
          mkdir -p dist
          python -m build --sdist --wheel --outdir dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Compute checksums
        shell: bash
        run: |
          cd dist
          for f in *.tar.gz *.whl; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-manager-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  generate-release-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate CHANGELOG section for this tag
        shell: bash
        run: |
          set -euo pipefail
          python3 code_manager.py changelog . > /tmp/full_changelog.md
          # Extract the section that matches the tag and ends at the next
          # "## " or EOF. Print it (without the leading header) for use as
          # the release body.
          #
          # Accepts both formats:
          #   ## vX.Y.Z              (code-manager's own conventional-commit format)
          #   ## [X.Y.Z]             (Keep-a-Changelog, no date)
          #   ## [X.Y.Z] - DATE      (Keep-a-Changelog, with date)
          # The "v" prefix on the tag is stripped for matching; the
          # surrounding brackets and date are optional.
          tag="${GITHUB_REF_NAME}"
          bare="${tag#v}"
          awk -v tag="$tag" -v bare="$bare" '
            BEGIN { capture=0; pat="^##[ ]+v?\\[?" bare "\\]?( - .+)?$" }
            /^## / {
              if (capture) { exit }
              if ($0 ~ pat) { capture=1; next }
            }
            capture { print }
          ' /tmp/full_changelog.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            # No dedicated section in CHANGELOG.md for this tag (typical
            # for the very first release: the "Unreleased" section is
            # the only one, and the tag will rename it retroactively).
            # Fall back to the full file minus the top header.
            awk '
              /^# / { if (seen_h1) next; seen_h1=1; next }
              { print }
            ' /tmp/full_changelog.md > /tmp/release_notes.md
          fi
          echo "---release notes---"
          cat /tmp/release_notes.md

      - name: Write release notes to artifact
        shell: bash
        run: |
          mkdir -p notes
          cp /tmp/release_notes.md notes/RELEASE_NOTES.md
          ls -la notes/

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: code-manager-release-notes
          path: notes/RELEASE_NOTES.md
          retention-days: 30

  github-release:
    name: GitHub Release
    needs: [build, generate-release-notes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: code-manager-dist
          path: dist

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: code-manager-release-notes
          path: notes

      - name: List artifacts
        run: |
          echo "=== dist/ ==="
          ls -la dist/
          echo "=== notes/ ==="
          ls -la notes/

      - name: Resolve release body
        id: body
        shell: bash
        run: |
          if [ -s notes/RELEASE_NOTES.md ]; then
            {
              echo 'body<<EOF'
              cat notes/RELEASE_NOTES.md
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag: $(cat <<<"$GITHUB_OUTPUT" | grep name= | head -1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.body.outputs.body }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sha256

  # ----------------------------------------------------------------------
  # PyPI publication via Trusted Publishing (OIDC).
  #
  # Configure once on PyPI: project "code-manager" → Publishing → add a
  # pending publisher with owner=CREATSAIF, repo=code-manager,
  # workflow_filename=release.yml, environment_name=pypi. No API token
  # is stored as a GitHub secret.
  #
  # Why not upload to Test PyPI first? v0.2.0 is still pre-1.0 and
  # follows SemVer; once a release is shipped we want PyPI to reflect
  # the exact artifacts GitHub Releases distributes. Test PyPI would
  # just double the CI minutes without changing the production outcome.
  # ----------------------------------------------------------------------
  pypi-publish:
    name: Publish to PyPI
    needs: [build, github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/code-manager
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: code-manager-dist
          path: dist

      - name: Verify artifact checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for f in *.tar.gz *.whl; do
            [ -f "$f" ] || continue
            expected=$(awk '{print $1}' "$f.sha256")
            actual=$(sha256sum "$f" | awk '{print $1}')
            if [ "$expected" != "$actual" ]; then
              echo "::error::sha256 mismatch for $f (expected $expected, got $actual)"
              exit 1
            fi
            echo "✓ $f sha256 OK"
          done

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No PYPI_API_TOKEN — OIDC handles auth via the pypa action.
          # packages-dir defaults to dist/, which matches our build output.
          skip-existing: true
